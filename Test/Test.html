<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draggable SVG on GitHub Pages</title>
    <style>
      #drag-zone {
        width: 500px;
        height: 200px;
        border: 1px solid #ccc;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="drag-zone">
      <svg id="my-svg" width="400" height="140" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="100" height="100" fill="blue" id="dragMe"/>
      </svg>
    </div>

    <script>
      const rect = document.querySelector('#dragMe');
      let isDragging = false;
      let startX, startY, rectX, rectY;

      function startDrag(e) {
        isDragging = true;
        startX = e.clientX ?? e.touches[0].clientX;
        startY = e.clientY ?? e.touches[0].clientY;
        rectX = parseFloat(rect.getAttribute('x'));
        rectY = parseFloat(rect.getAttribute('y'));
        e.preventDefault();
      }

      function moveDrag(e) {
        if (!isDragging) return;
        const x = e.clientX ?? e.touches[0].clientX;
        const y = e.clientY ?? e.touches[0].clientY;
        const dx = x - startX;
        const dy = y - startY;
        rect.setAttribute('x', rectX + dx);
        rect.setAttribute('y', rectY + dy);
        e.preventDefault();
      }

      function endDrag(e) {
        isDragging = false;
      }

      // Mouse events
      rect.addEventListener('mousedown', startDrag);
      window.addEventListener('mousemove', moveDrag);
      window.addEventListener('mouseup', endDrag);

      // Touch events
      rect.addEventListener('touchstart', startDrag, { passive: false });
      window.addEventListener('touchmove', moveDrag, { passive: false });
      window.addEventListener('touchend', endDrag);
    </script>
  </body>
</html>
